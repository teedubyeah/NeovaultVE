services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neovisionve-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/neovisionve.db
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_PEPPER=${ENCRYPTION_PEPPER}
      - APP_URL=${APP_URL:-http://localhost:8080}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-NeovisionVE <no-reply@neovisionve.local>}
    volumes:
      - neovisionve-data:/app/data
    networks:
      - neovisionve-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 8s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: neovisionve-ui
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - neovisionve-network

volumes:
  neovisionve-data:
    driver: local

networks:
  neovisionve-network:
    driver: bridge
